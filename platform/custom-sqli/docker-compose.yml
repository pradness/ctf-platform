version: "3.8"

services:
  db:
    image: mariadb:10.5
    container_name: sqli-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ctf
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"

  app:
    build: .
    container_name: sqli-app
    depends_on:
      - db
    ports:
      - "8080:80"
